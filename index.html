<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>涵香療癒所 🌿 專屬精油盲抽</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: linear-gradient(135deg, #FDFBF7 0%, #F3E8E0 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #5C4A3D; }
        .container { text-align: center; background: rgba(255, 255, 255, 0.75); padding: 40px 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(188, 138, 95, 0.1); backdrop-filter: blur(10px); max-width: 420px; width: 85%; }
        h1 { font-size: 24px; color: #8C6D53; margin-bottom: 5px; }
        p.subtitle { font-size: 14px; color: #9E897A; margin-bottom: 25px; }
        button { background-color: #D4A373; color: white; border: none; padding: 14px 28px; width: 100%; font-size: 16px; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(212, 163, 115, 0.3); }
        button:hover:not(:disabled) { background-color: #BC8A5F; transform: translateY(-2px); }
        button:disabled { background-color: #CCC; cursor: not-allowed; box-shadow: none; }
        .card { margin-top: 20px; padding: 30px 25px; background: #FFFFFF; border-radius: 15px; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05); display: none; border: 1px solid rgba(212, 163, 115, 0.2); text-align: left; }
        .oil-name { font-size: 24px; font-weight: bold; color: #BC8A5F; text-align: center; margin-bottom: 15px; letter-spacing: 2px; }
        .section-title { font-size: 13px; color: #D4A373; margin-top: 20px; margin-bottom: 5px; font-weight: bold; border-bottom: 1px dashed #E8D8C8; padding-bottom: 3px; display: inline-block;}
        .quote-box { background: #FDFBF7; padding: 15px; border-radius: 10px; font-style: italic; color: #8C6D53; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .content-text { font-size: 15px; line-height: 1.6; color: #6D5B4F; margin-bottom: 10px; }
        .affirmation-box { background: #F3E8E0; padding: 15px; border-radius: 10px; text-align: center; font-size: 15px; color: #5C4A3D; font-weight: bold; margin-top: 20px; }
        .hidden { display: none !important; }
        .error-msg { color: #D4A373; font-weight: bold; font-size: 18px; margin-top: 20px;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>涵香療癒所 🌿</h1>
        
        <div id="blockArea" class="hidden">
            <p class="error-msg">請透過官方 LINE 進入盲抽系統喔！</p>
            <p style="font-size:14px; color:#9E897A;">這樣我們才能為您準備專屬的療癒指引。</p>
        </div>

        <div id="mainArea">
            <p class="subtitle" id="greetingText">宇宙頻率連線中...</p>
            <div id="inputArea">
                <button id="drawBtn" onclick="drawOil()" disabled>載入中...</button>
            </div>

            <div class="card" id="resultCard">
                <div class="oil-name" id="oilName"></div>
                <div class="quote-box" id="oilQuote"></div>
                <div class="section-title">✨ 能量解析</div>
                <div class="content-text" id="oilEnergy"></div>
                <div class="section-title">🌿 實踐提案</div>
                <div class="content-text" id="oilAction"></div>
                <div class="affirmation-box">
                    <div style="font-size: 12px; color: #9E897A; margin-bottom: 5px;">今日肯定語</div>
                    <div id="oilAffirmation"></div>
                </div>
                <button onclick="drawOil()" style="margin-top: 25px; background-color: #FFF; color: #D4A373; border: 1px solid #D4A373; box-shadow: none;">再抽一張</button>
            </div>
        </div>
    </div>

    <script>
        let oils = [];
        let customerName = "匿名盲抽";
        const drawBtn = document.getElementById('drawBtn');
        const greetingText = document.getElementById('greetingText');

        // 1. 初始化 LINE LIFF
        async function initLiff() {
            try {
                await liff.init({ liffId: "2009442731-uAtwWSRT" });
                
                // 檢查是否在 LINE 裡面開啟
                if (!liff.isInClient()) {
                    document.getElementById('mainArea').classList.add('hidden');
                    document.getElementById('blockArea').classList.remove('hidden');
                    return; // 終止後續動作
                }

                // 若在 LINE 中，取得使用者名字
                const profile = await liff.getProfile();
                customerName = profile.displayName;
                greetingText.innerText = `親愛的 ${customerName}，抽取今日的專屬療癒指引吧`;
                
                // 開始呼叫後端拿精油資料
                fetchNotionOils();

            } catch (err) {
                console.error("LIFF 初始化失敗", err);
                greetingText.innerText = "系統連線異常，請稍後再試";
            }
        }

        // 2. 呼叫 GAS 後端取得精油
        function fetchNotionOils() {
            google.script.run
                .withSuccessHandler(function(data) {
                    oils = data;
                    drawBtn.innerText = "輕觸牌卡，開始盲抽";
                    drawBtn.disabled = false;
                })
                .withFailureHandler(function(error) {
                    drawBtn.innerText = "資料連線失敗";
                })
                .getNotionOils();
        }

        // 3. 抽油與寫入客資
        function drawOil() {
            if (oils.length === 0) return;

            const randomIndex = Math.floor(Math.random() * oils.length);
            const selected = oils[randomIndex];

            document.getElementById('inputArea').classList.add('hidden');
            const card = document.getElementById('resultCard');
            
            card.style.animation = 'none';
            card.offsetHeight; 
            card.style.animation = 'fadeIn 0.8s ease forwards';

            document.getElementById('oilName').innerText = selected.name;
            document.getElementById('oilQuote').innerText = selected.quote;
            document.getElementById('oilEnergy').innerText = selected.energy;
            document.getElementById('oilAction').innerText = selected.action;
            document.getElementById('oilAffirmation').innerText = selected.affirmation;
            card.style.display = 'block';

            // 背景自動寫入 Notion 療癒個案紀錄
            google.script.run.saveToNotion(customerName, selected.name);
        }

        // 網頁一載入就啟動 LIFF
        initLiff();
    </script>
</body>
</html>
